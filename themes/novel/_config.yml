# 小说主题配置（可在站点根目录用 _config.novel.yml 覆盖）

# 封面主页（根路径）背景图，相对站点 source/ 或已生成的 URL
home_hero_image: /images/dahuangya.jpg
# 封面显示的作者名（若空则用站点 config.author）
home_author: HNO3

# 连载标题（显示在章节页顶部）
series_title: ''

# 仅列出带此标签的文章为「章节目录」；留空则包含站点全部文章（按日期升序）
series_tag: '大黄鸭'

# 阅读器
reader:
  # 正文最大宽度 (rem)
  content_max_width: 40
  # 是否为首段以外段落加中文缩进
  indent_paragraphs: true

# Giscus（基于 GitHub Discussions 的评论，免费）
# 在 https://giscus.app/zh-CN 填写仓库并生成脚本后，把 data-repo-id / data-category-id 填到站点根目录的 _config.novel.yml
giscus:
  enable: true
  repo: TheoHNO325/bigyellowduck
  repo_id: 'R_kgDOR5ns5A'
  category: 'General'
  category_id: ''
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: dark_dimmed
  lang: zh-CN
  loading: lazy

# 页脚在站点标题与「由 Hexo 生成」之间的单行文案（纯文本，可不写）
footer_line: ''

# 最后一章滚到底时的彩蛋短句（HTML 不可用，换行可用 \n 或在 md 里改主题配置多行 YAML）
finale_line: '《当大黄鸭被发现在四大发明广场》至此告一段落。感谢你的阅读。'

# 外传：聚合页路径与标签名（文章须带此标签且勿带 series_tag，以免进入正传目录）
waizhuan_tag: '外传'
waizhuan_url: /waizhuan/
waizhuan_series_title: '大黄鸭 · 外传'

# 主导航：「目录」= 平铺连载列表；归档页 /archives 仍可由 Hexo 生成（按年月汇总），需要时在浏览器打开即可
menu:
  封面: /
  目录: /read/
  外传: /waizhuan/
